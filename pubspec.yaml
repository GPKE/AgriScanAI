name: agri_scan_ai
description: AI-powered digital agriculture and market access platform for African smallholder farmers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # UI & Design
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  flutter_svg: ^2.0.5

  # Image & Camera
  image_picker: ^1.0.4
  permission_handler: ^11.4.3
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.19.0
  get_it: ^7.6.0
  dio: ^5.3.1
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.2
  uuid: ^4.0.0
  logger: ^2.0.1
  dartz: ^0.10.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^12.0.0

  # Animation & Lottie
  lottie: ^2.7.0

  # Localization
  easy_localization: ^3.0.2

  # Date/Time
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/locales/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
